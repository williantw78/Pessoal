<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Controle Financeiro</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->

<div id="loginScreen" class="login-screen">

  <div class="login-box">

    <h2>Login</h2>

    <input
      type="password"
      id="passwordInput"
      placeholder="Senha"
    >

    <button onclick="checkLogin()">
      Entrar
    </button>

    <p id="loginError"></p>

  </div>

</div>

<!-- APP -->

<div class="container">

  <h1>Controle Financeiro</h1>

  <div class="actions">

    <button onclick="addService()">
      + Serviço
    </button>

    <button onclick="addMonth()">
      + Mês
    </button>

    <button onclick="addIncome()">
      + Receita
    </button>

  </div>

  <!-- TABELA -->

  <div class="table-container">

    <table>

      <thead>

        <tr id="headerRow">

          <th>Serviço</th>
          <th>Responsável</th>
          <th>Junho 2026</th>

        </tr>

      </thead>

      <tbody id="servicesBody">

        <tr>

          <td>

            <div class="cell-flex">

              <input
                type="text"
                value="Aluguel"
              >

              <button
                class="delete-btn"
                onclick="removeRow(this)"
              >
                X
              </button>

            </div>

          </td>

          <td>

            <select onchange="updateTotals()">
              <option>Willian</option>
              <option>Duda</option>
            </select>

          </td>

          <td>

            <input
              type="text"
              class="money-input"
              value="0"
            >

          </td>

        </tr>

      </tbody>

      <tfoot>

        <tr id="totalRow">

          <td colspan="2">
            <strong>Total</strong>
          </td>

          <td class="month-total">
            0,00 €
          </td>

        </tr>

      </tfoot>

    </table>

  </div>

  <!-- RECEITAS -->

  <div class="income-section">

    <h2>Valores a Receber</h2>

    <table>

      <thead>

        <tr>

          <th>Descrição</th>
          <th>Responsável</th>
          <th>Valor</th>

        </tr>

      </thead>

      <tbody id="incomeBody">

        <tr>

          <td>

            <div class="cell-flex">

              <input
                type="text"
                value="Salário"
              >

              <button
                class="delete-btn"
                onclick="removeRow(this)"
              >
                X
              </button>

            </div>

          </td>

          <td>

            <select onchange="updateTotals()">
              <option>Willian</option>
              <option>Duda</option>
            </select>

          </td>

          <td>

            <input
              type="text"
              class="income-input"
              value="0"
            >

          </td>

        </tr>

      </tbody>

    </table>

  </div>

  <!-- RESUMO -->

  <div class="summary">

    <div class="card">

      <div class="summary-header">

        <select
          id="monthSelector"
          onchange="updateTotals()"
        >
          <option>Junho 2026</option>
        </select>

      </div>

      <h3>Total a Pagar</h3>

      <p class="main-total" id="totalToPay">
        0,00 €
      </p>

      <hr>

      <div class="person-line">
        <span>Willian</span>
        <strong id="willianTotal">0,00 €</strong>
      </div>

      <div class="person-line">
        <span>Duda</span>
        <strong id="dudaTotal">0,00 €</strong>
      </div>

      <hr>

      <h3>Total a Receber</h3>

      <p class="main-total receive-total" id="totalToReceive">
        0,00 €
      </p>

      <hr>

      <h3>Saldo</h3>

      <p class="main-total result-positive" id="finalResult">
        0,00 €
      </p>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
