<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controlo Financeiro Otimizado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Controlo Financeiro</h1>
        <br>Versão 2

        <!-- Barra de Ações Principais -->
        <div class="actions-bar">
            <button class="btn-add" onclick="salvarNaNuvem()">Salvar na Nuvem</button>
            <button class="btn-load" style="background-color: #0284c7;" onclick="carregarDaNuvem()">Carregar da Nuvem</button>
            <button onclick="salvarDados()">Backup (.TXT)</button>
        </div>

        <!-- Seção de Utilizadores -->
        <div class="section">
            <h2>Gestão de Responsáveis</h2>
            <div class="input-row">
                <input type="text" id="novoResponsavel" placeholder="Nome do responsável">
                <button onclick="adicionarResponsavel()">Adicionar</button>
            </div>
            <div id="listaResponsaveis" class="tags-container"></div>
        </div>

        <!-- Botões de Gestão de Colunas/Linhas -->
        <div class="section-actions">
            <button class="btn-add" onclick="promptMes()">+ Adicionar Mês</button>
            <button class="btn-remove" onclick="promptRemoverMes()">- Eliminar Mês</button>
        </div>

        <!-- TABELA DE CONTAS A PAGAR -->
        <div class="section">
            <h2>Contas a Pagar (Serviços)</h2>
            <button class="btn-small" onclick="adicionarLinha('pagar')">+ Incluir Serviço</button>
            <div class="table-wrapper">
                <table id="tabelaPagar">
                    <thead>
                        <tr id="headerPagar">
                            <th>Serviços</th>
                            <th>Responsável</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="bodyPagar"></tbody>
                    <tfoot>
                        <tr id="footerPagar">
                            <td colspan="2">Total</td>
                            <td>-</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <!-- TABELA DE CONTAS A RECEBER -->
        <div class="section">
            <h2>Contas a Receber (Rendimentos)</h2>
            <button class="btn-small" onclick="adicionarLinha('receber')">+ Incluir Rendimento</button>
            <div class="table-wrapper">
                <table id="tabelaReceber">
                    <thead>
                        <tr id="headerReceber">
                            <th>Fontes de Rendimento</th>
                            <th>Responsável</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="bodyReceber"></tbody>
                    <tfoot>
                        <tr id="footerReceber">
                            <td colspan="2">Total</td>
                            <td>-</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <!-- RESUMO MENSAL POR PESSOA E SALDO GLOBAL -->
        <div class="section summary-section">
            <h2>Resumo por Mês Selecionado</h2>
            <div class="select-box">
                <label for="selectMesFiltro">Escolha o Mês:</label>
                <select id="selectMesFiltro" onchange="atualizarResumo()"></select>
            </div>

            <div id="detalhePorPessoa"></div>

            <div class="dashboard-totals">
                <div class="dash-card">
                    <h3>Total a Receber</h3>
                    <p id="resumoReceber">0,00 €</p>
                </div>
                <div class="dash-card">
                    <h3>Total a Pagar</h3>
                    <p id="resumoPagar">0,00 €</p>
                </div>
                <div id="cardSaldo" class="dash-card">
                    <h3>Saldo Líquido</h3>
                    <p id="resumoSaldo">0,00 €</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
